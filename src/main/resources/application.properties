spring.application.name=url-shortener

# --- Datastore: in-memory H2 (zero setup) ---
spring.datasource.url=jdbc:h2:mem:urlshortener;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- H2 web console at http://localhost:8080/h2-console ---
# JDBC URL to use in the console: jdbc:h2:mem:urlshortener
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
